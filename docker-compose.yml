# Clinic Workforce MVP — 生產 compose(單一真相,2026-07-17 收斂)
services:
  db:
    image: postgres:16
    container_name: clinic-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: clinic_prod
      POSTGRES_USER: clinic
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - clinic_prod_dbdata:/var/lib/postgresql/data
    networks: [clinic_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinic -d clinic_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinic-prod-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=1024
      DATABASE_URL: postgresql://clinic:${DB_PASSWORD}@db:5432/clinic_prod
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${JWT_SECRET}
      FACE_SERVICE_URL: http://face:8000
      FACE_THRESHOLD: ${FACE_THRESHOLD}
      FACE_MODE: shadow
    networks: [clinic_net]

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: clinic-prod-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on: [app]
    networks: [clinic_net]

  face:
    build: ./face-service
    restart: unless-stopped
    networks: [clinic_net]
    volumes:
      - face_models:/root/.insightface
      - face_frames:/data/frames
      - ./face-service/models:/srv/models

networks:
  clinic_net:
    external: true
    name: clinic_clinic_net

volumes:
  clinic_prod_dbdata:
    external: true
    name: clinic_clinic_prod_dbdata
  face_models:
  face_frames:
